[mgr]
cwd = { fg = "#c7c6c4" }
hovered = { fg = "#201d16", bg = "#c7c6c4" }
find_keyword = { fg = "#A67247", italic = true }
find_position = { fg = "#c7c6c4", bold = true, italic = true }
marker_copied = { fg = "#201d16", bg = "#A67247" }
marker_cut = { fg = "#201d16", bg = "#6C6A49" }
marker_marked = { fg = "#201d16", bg = "#895837" }
marker_selected = { fg = "#201d16", bg = "#93774C" }
tab_active = { fg = "#201d16", bg = "#c7c6c4" }
tab_inactive = { fg = "#6C6A49", bg = "#756f5f" }
count_copied = { fg = "#201d16", bg = "#A67247" }
count_cut = { fg = "#201d16", bg = "#6C6A49" }
count_selected = { fg = "#201d16", bg = "#93774C" }
border_fg = "#93774C"

[status]
mode_normal = { fg = "#201d16", bg = "#c7c6c4", bold = true }
mode_select = { fg = "#201d16", bg = "#895837", bold = true }
mode_unset = { fg = "#201d16", bg = "#6C6A49", bold = true }
progress_fg = "#c7c6c4"
progress_bg = "#756f5f"
progress_error = { fg = "#6C6A49", bg = "#201d16" }
permissions_t = "#c7c6c4"
permissions_r = "#A67247"
permissions_w = "#6C6A49"
permissions_x = "#895837"
permissions_s = "#93774C"

[input]
border = "#93774C"
selected = { fg = "#201d16", bg = "#c7c6c4" }

[select]
border = "#93774C"
active = "#c7c6c4"

[tasks]
border = "#93774C"

[which]
mask_bg = "#756f5f"
cand = "#c7c6c4"
rest = "#c7c6c4"
desc = "#A67247"

[notify]
title_info = "#c7c6c4"
title_warn = "#A67247"
title_error = "#6C6A49"

[filetype]
rules = [
  { mime = "image/*", fg = "#A67247" },
  { mime = "video/*", fg = "#A67247" },
  { mime = "audio/*", fg = "#A67247" },
  { mime = "application/zip", fg = "#6C6A49" },
  { mime = "application/x-tar", fg = "#6C6A49" },
  { mime = "application/x-bzip2", fg = "#6C6A49" },
  { mime = "application/x-7z-compressed", fg = "#6C6A49" },
  { mime = "application/x-rar", fg = "#6C6A49" },
  { mime = "text/*", fg = "#c7c6c4" },
  { mime = "application/json", fg = "#895837" },
  { mime = "*/", fg = "#c7c6c4" },
]
